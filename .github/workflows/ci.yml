name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: ruff format --check src tests
      - run: mypy
      - run: pytest tests/ -v -m "not bq"   # gated BQ tests excluded by default
